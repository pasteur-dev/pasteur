tables:
  client:
    primary_key: client_id
    fields:
      client_id: id
      gender: categorical
      birth_date: date

  client_district:
    primary_key: client_district_id
    fields:
      client_district_id: id
      client_id: id:client.client_id
      name: categorical
      region: categorical
      inhabitants: numerical
      muni_u500: numerical
      muni_500_2k: numerical
      muni_2k_10k: numerical
      muni_o10k: numerical
      cities: numerical
      urban_ratio: numerical
      avg_salary: numerical
      unemploy_95: numerical?
      unemploy_96: numerical
      entrepreneurs: numerical
      crimes_95: numerical?
      crimes_96: numerical

  account:
    primary_key: disp_id
    fields:
      disp_id: id
      client_id: id:client.client_id
      disp_type: categorical
      frequency: categorical
      date: date

  card:
    primary_key: card_id
    fields:
      card_id: id
      disp_id: id:account.disp_id
      type: categorical
      issued: date

  loan:
    primary_key: loan_id
    fields:
      loan_id: id
      disp_id: id:account.disp_id
      date: date
      amount: numerical
      duration: ordinal
      payments: numerical
      status: categorical

  order:
    primary_key: order_id
    max_children: 50
    fields:
      order_id: id
      disp_id: id:account.disp_id
      bank_to: categorical
      account_to: numerical
      amount: numerical
      k_symbol: categorical

  trans:
    primary_key: trans_id
    max_children: 50
    fields:
      trans_id: id
      disp_id: id:account.disp_id
      date: date
      type: categorical
      operation: categorical?
      amount: numerical
      balance: numerical
      k_symbol: categorical?
      bank: categorical?
      account: numerical?
