<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LITMUS</title>
</head>
<body>
    <h1>LITMUS</h1>
    <p>Live Interactive Tool for Measuring User-perceived Synthesis quality</p>
    <p>React frontend will be built here.</p>
    <script>
        fetch('/api/views')
            .then(r => r.json())
            .then(views => {
                document.body.innerHTML += '<h2>Available Views</h2><pre>' + JSON.stringify(views, null, 2) + '</pre>';
            });
        fetch('/api/experiments')
            .then(r => r.json())
            .then(exps => {
                document.body.innerHTML += '<h2>Experiments</h2><pre>' + JSON.stringify(exps, null, 2) + '</pre>';
            });
    </script>
</body>
</html>
